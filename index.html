<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReLiOn Motor Test Arayüzü</title>
<style>
:root {
  --primary: #1a365d;
  --primary-light: #2c5282;
  --accent: #2b6cb0;
  --bg: #ffffff;
  --bg-alt: #f7fafc;
  --text: #1a202c;
  --text-light: #4a5568;
  --border: #e2e8f0;
  --success: #276749;
  --warning: #c05621;
  --danger: #c53030;
  --info: #2b6cb0;
  --code-bg: #edf2f7;
  --shadow: 0 1px 3px rgba(0,0,0,0.12);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
  background: var(--bg);
}
.container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }
header {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  padding: 2rem 0;
  text-align: center;
}
header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
header .subtitle { font-size: 1.1rem; opacity: 0.9; margin-bottom: 0; }
section { padding: 2.5rem 0; border-bottom: 1px solid var(--border); }
h2 {
  font-size: 1.6rem;
  color: var(--primary);
  margin-bottom: 1.5rem;
  padding-bottom: 0.5rem;
  border-bottom: 3px solid var(--accent);
  font-weight: 700;
}
h3 { font-size: 1.2rem; color: var(--primary-light); margin: 1.5rem 0 0.75rem; font-weight: 600; }
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}
.form-group {
  margin-bottom: 1rem;
}
label {
  display: block;
  font-weight: 600;
  margin-bottom: 0.3rem;
  color: var(--primary);
  font-size: 0.9rem;
}
input, select {
  width: 100%;
  padding: 0.6rem 0.8rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: 1rem;
  background: var(--bg-alt);
}
input:focus, select:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg);
}
button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 0.8rem 2rem;
  font-size: 1.1rem;
  font-weight: 600;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s;
  width: 100%;
  margin-top: 1.5rem;
}
button:hover {
  background: var(--primary-light);
}
.results {
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1.5rem;
  margin-top: 1.5rem;
  display: none;
}
.results h3 { margin-top: 0; }
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.metric-card {
  background: white;
  padding: 1rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  text-align: center;
}
.metric-card .label { font-size: 0.85rem; color: var(--text-light); text-transform: uppercase; font-weight: 600; }
.metric-card .value { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin: 0.5rem 0; }
.metric-card .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 3px; font-size: 0.75rem; font-weight: 600; }
pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1rem;
  overflow-x: auto;
  font-size: 0.85rem;
  font-family: 'Fira Code', 'Consolas', monospace;
  max-height: 400px;
}
.alert { padding: 1rem; border-radius: 6px; margin: 1rem 0; border-left: 4px solid; }
.alert-danger { background: #fff5f5; border-color: var(--danger); color: #742a2a; }
.badge-success { background: #c6f6d5; color: #276749; }
.badge-warning { background: #fefcbf; color: #975a16; }
.badge-danger { background: #fed7d7; color: #9b2c2c; }
.badge-info { background: #e2e8f0; color: #4a5568; }
@media (max-width: 768px) {
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>ReLiOn Motor Test Arayüzü</h1>
    <div class="subtitle">Teknik Ekip Hızlı Deneme ve Doğrulama Ortamı</div>
  </div>
</header>

<section>
  <div class="container">
    <div class="form-grid">
      <!-- Batarya Verileri -->
      <div>
        <h2>🔋 Batarya Parametreleri</h2>
        
        <div class="form-group">
          <label>Kimya Türü (chemistry_type)</label>
          <select id="chemistry_type">
            <option value="LFP">LFP (Lityum Demir Fosfat)</option>
            <option value="NMC">NMC (Nikel Manganez Kobalt)</option>
            <option value="NCA">NCA (Nikel Kobalt Alüminyum)</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Nominal Kapasite (Ah)</label>
          <input type="number" id="nominal_capacity" value="100.0" step="0.1">
        </div>
        
        <div class="form-group">
          <label>Mevcut Kapasite (Ah)</label>
          <input type="number" id="measured_capacity" value="95.0" step="0.1">
        </div>
        
        <div class="form-group">
          <label>Döngü Sayısı (Cycle Count)</label>
          <input type="number" id="cycle_count" value="500">
        </div>
        
        <div class="form-group">
          <label>İç Direnç (Ohm)</label>
          <input type="number" id="internal_resistance" value="0.015" step="0.001">
        </div>
        
        <div class="form-group">
          <label>Yaş (Yıl)</label>
          <input type="number" id="age" value="2.0" step="0.1">
        </div>
        
        <div class="form-group">
          <label>Kullanım Senaryosu</label>
          <select id="usage_scenario">
            <option value="BESS">BESS (Batarya Enerji Depolama)</option>
            <option value="HOME">Ev Tipi Depolama</option>
            <option value="MICROGRID">Mikro Şebeke</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Beklenen Ömür (Yıl)</label>
          <input type="number" id="expected_lifetime_years" value="10.0" step="0.1">
        </div>
      </div>
      
      <!-- Ekonomik Veriler -->
      <div>
        <h2>💰 Ekonomik Parametreler</h2>
        
        <div class="form-group">
          <label>Toplam Enerji (kWh)</label>
          <input type="number" id="total_energy_kwh" value="80000.0" step="100">
        </div>
        
        <div class="form-group">
          <label>Enerji Fiyatı ($/kWh)</label>
          <input type="number" id="energy_price_per_kwh" value="0.20" step="0.01">
        </div>
        
        <div class="form-group">
          <label>Toplam Maliyet ($)</label>
          <input type="number" id="total_cost" value="3000.0" step="100">
        </div>
        
        <div class="form-group">
          <label>Yatırım Maliyeti ($)</label>
          <input type="number" id="investment_cost" value="1500.0" step="100">
        </div>
        
        <div class="form-group">
          <label>Proje Ömrü (Yıl)</label>
          <input type="number" id="project_lifetime_years" value="10.0" step="0.1">
        </div>
        
        <button onclick="runAnalysis()">Analizi Çalıştır</button>
      </div>
    </div>
    
    <div id="error-box" class="alert alert-danger" style="display:none;"></div>
    
    <div id="results" class="results">
      <h2>📊 Analiz Sonuçları</h2>
      
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="label">Genel Skor</div>
          <div class="value" id="res-score">-</div>
          <div class="badge" id="res-score-badge">-</div>
        </div>
        
        <div class="metric-card">
          <div class="label">Pil Sağlığı (SoH)</div>
          <div class="value" id="res-soh">-</div>
          <div class="badge" id="res-soh-badge">-</div>
        </div>
        
        <div class="metric-card">
          <div class="label">Kalan Ömür (RUL)</div>
          <div class="value" id="res-rul">-</div>
          <div class="badge" id="res-rul-badge">-</div>
        </div>
        
        <div class="metric-card">
          <div class="label">Net Kazanç</div>
          <div class="value" id="res-gain">-</div>
          <div class="badge badge-info">USD</div>
        </div>
      </div>
      
      <h3>Detaylı JSON Çıktısı (Motor Yanıtı)</h3>
      <pre id="json-output"></pre>
    </div>
    
  </div>
</section>

<script>
async function runAnalysis() {
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  
  const payload = {
    battery: {
      chemistry_type: document.getElementById('chemistry_type').value,
      nominal_capacity: parseFloat(document.getElementById('nominal_capacity').value),
      measured_capacity: parseFloat(document.getElementById('measured_capacity').value),
      cycle_count: parseInt(document.getElementById('cycle_count').value),
      internal_resistance: parseFloat(document.getElementById('internal_resistance').value),
      age: parseFloat(document.getElementById('age').value),
      usage_scenario: document.getElementById('usage_scenario').value,
      expected_lifetime_years: parseFloat(document.getElementById('expected_lifetime_years').value)
    },
    economic: {
      total_energy_kwh: parseFloat(document.getElementById('total_energy_kwh').value),
      energy_price_per_kwh: parseFloat(document.getElementById('energy_price_per_kwh').value),
      total_cost: parseFloat(document.getElementById('total_cost').value),
      investment_cost: parseFloat(document.getElementById('investment_cost').value),
      project_lifetime_years: parseFloat(document.getElementById('project_lifetime_years').value)
    }
  };

  try {
    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    
    const result = await response.json();
    
    if (result.success) {
      document.getElementById('results').style.display = 'block';
      const data = result.data;
      
      document.getElementById('res-score').innerText = data.general_score.toFixed(2);
      let badge = document.getElementById('res-score-badge');
      badge.innerText = data.score_label;
      badge.className = 'badge';
      if(data.score_color === 'green') badge.classList.add('badge-success');
      else if(data.score_color === 'yellow') badge.classList.add('badge-warning');
      else badge.classList.add('badge-danger');
      
      document.getElementById('res-soh').innerText = '%' + data.soh.toFixed(2);
      document.getElementById('res-soh-badge').innerText = data.soh_label;
      document.getElementById('res-soh-badge').className = 'badge badge-info';
      
      document.getElementById('res-rul').innerText = Math.round(data.rul) + ' Döngü';
      document.getElementById('res-rul-badge').innerText = data.rul_label;
      document.getElementById('res-rul-badge').className = 'badge badge-info';
      
      document.getElementById('res-gain').innerText = '$' + data.net_gain.toLocaleString();
      
      document.getElementById('json-output').innerText = JSON.stringify(data, null, 2);
    } else {
      const errBox = document.getElementById('error-box');
      errBox.style.display = 'block';
      errBox.innerText = result.error + '\n' + JSON.stringify(result.details, null, 2);
    }
  } catch (e) {
    const errBox = document.getElementById('error-box');
    errBox.style.display = 'block';
    errBox.innerText = 'Sunucuya bağlanılamadı: ' + e.message;
  }
}
</script>
</body>
</html>
